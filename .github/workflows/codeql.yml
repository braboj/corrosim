name: CodeQL

# Platform SAST (GitHub CodeQL) for the Python sources — issue #31 / ADR 0007.
# Complements the per-commit Bandit job in ci.yml with GitHub's semantic
# code-scanning; findings surface in the repo Security tab.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 3 * * 1"   # weekly, Monday 03:27 UTC

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
