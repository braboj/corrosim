name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff + mypy
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.15.*" "mypy==2.1.*"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Type-check (mypy)
        # Non-strict; the scientific deps aren't installed in this job, so mypy
        # treats them as untyped via ignore_missing_imports (see [tool.mypy]).
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        # Coverage is warn-only for now (legacy code); ratchet a --cov-fail-under
        # threshold once the suite covers the QM-light surface.
        run: pytest -q --cov=corrosim --cov-report=term-missing
